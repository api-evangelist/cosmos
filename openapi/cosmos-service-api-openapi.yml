                    '@type':
                      type: string
                      description: "A URL/resource name that uniquely identifies the type of the serialized\nprotocol buffer message. This string must contain at least\none \"/\" character. The last segment of the URL's path must represent\nthe fully qualified name of the type (as in\n`path/google.protobuf.Duration`). The name should be in a canonical form\n(e.g., leading \".\" is not accepted).\n\nIn practice, teams usually precompile into the binary all types that they\nexpect it to use in the context of Any. However, for URLs which use the\nscheme `http`, `https`, or no scheme, one can optionally set up a type\nserver that maps type URLs to message definitions as follows:\n\n* If no scheme is provided, `https` is assumed.\n* An HTTP GET on the URL must yield a [google.protobuf.Type][]\n  value in binary format, or produce an error.\n* Applications are allowed to cache lookup results based on the\n  URL, or have them precompiled into a binary to avoid any\n  lookup. Therefore, binary compatibility needs to be preserved\n  on changes to types. (Use versioned type names to manage\n  breaking changes.)\n\nNote: this functionality is not currently available in the official\nprotobuf release, and it is not used for type URLs beginning with\ntype.googleapis.com. As of May 2023, there are no widely used type server\nimplementations and no plans to implement one.\n\nSchemes other than `http`, `https` (or the empty scheme) might be\nused with implementation specific semantics."
                  additionalProperties: {}
                  description: "`Any` contains an arbitrary serialized protocol buffer message along with a\nURL that describes the type of the serialized message.\n\nProtobuf library provides support to pack/unpack Any values in the form\nof utility functions or additional generated methods of the Any type.\n\nExample 1: Pack and unpack a message in C++.\n\n    Foo foo = ...;\n    Any any;\n    any.PackFrom(foo);\n    ...\n    if (any.UnpackTo(&foo)) {\n      ...\n    }\n\nExample 2: Pack and unpack a message in Java.\n\n    Foo foo = ...;\n    Any any = Any.pack(foo);\n    ...\n    if (any.is(Foo.class)) {\n      foo = any.unpack(Foo.class);\n    }\n    // or ...\n    if (any.isSameTypeAs(Foo.getDefaultInstance())) {\n      foo = any.unpack(Foo.getDefaultInstance());\n    }\n\n Example 3: Pack and unpack a message in Python.\n\n    foo = Foo(...)\n    any = Any()\n    any.Pack(foo)\n    ...\n    if any.Is(Foo.DESCRIPTOR):\n      any.Unpack(foo)\n      ...\n\n Example 4: Pack and unpack a message in Go\n\n     foo := &pb.Foo{...}\n     any, err := anypb.New(foo)\n     if err != nil {\n       ...\n     }\n     ...\n     foo := &pb.Foo{}\n     if err := any.UnmarshalTo(foo); err != nil {\n       ...\n     }\n\nThe pack methods provided by protobuf library will by default use\n'type.googleapis.com/full.type.name' as the type URL and the unpack\nmethods only use the fully qualified type name after the last '/'\nin the type URL, for example \"foo.bar.com/x/y.z\" will yield type\nname \"y.z\".\n\nJSON\n====\nThe JSON representation of an `Any` value uses the regular\nrepresentation of the deserialized, embedded message, with an\nadditional field `@type` which contains the type URL. Example:\n\n    package google.profile;\n    message Person {\n      string first_name = 1;\n      string last_name = 2;\n    }\n\n    {\n      \"@type\": \"type.googleapis.com/google.profile.Person\",\n      \"firstName\": <string>,\n      \"lastName\": <string>\n    }\n\nIf the embedded message type is well-known and has a custom JSON\nrepresentation, that representation will be embedded adding a field\n`value` which holds the custom JSON in addition to the `@type`\nfield. Example (for message [google.protobuf.Duration][]):\n\n    {\n      \"@type\": \"type.googleapis.com/google.protobuf.Duration\",\n      \"value\": \"1.212s\"\n    }"
      parameters:
      - name: hash
        description: hash is the tx hash to query, encoded as a hex string.
        in: path
        required: true
        type: string
      tags:
      - Service
definitions:
  cosmos.tx.v1beta1.SignerInfo:
    type: object
    properties:
      publicKey:
        description: 'public_key is the public key of the signer. It is optional for accounts

          that already exist in state. If unset, the verifier can use the required \

          signer address for this position and lookup the public key.'
        type: object
        properties:
          '@type':
            type: string
            description: "A URL/resource name that uniquely identifies the type of the serialized\nprotocol buffer message. This string must contain at least\none \"/\" character. The last segment of the URL's path must represent\nthe fully qualified name of the type (as in\n`path/google.protobuf.Duration`). The name should be in a canonical form\n(e.g., leading \".\" is not accepted).\n\nIn practice, teams usually precompile into the binary all types that they\nexpect it to use in the context of Any. However, for URLs which use the\nscheme `http`, `https`, or no scheme, one can optionally set up a type\nserver that maps type URLs to message definitions as follows:\n\n* If no scheme is provided, `https` is assumed.\n* An HTTP GET on the URL must yield a [google.protobuf.Type][]\n  value in binary format, or produce an error.\n* Applications are allowed to cache lookup results based on the\n  URL, or have them precompiled into a binary to avoid any\n  lookup. Therefore, binary compatibility needs to be preserved\n  on changes to types. (Use versioned type names to manage\n  breaking changes.)\n\nNote: this functionality is not currently available in the official\nprotobuf release, and it is not used for type URLs beginning with\ntype.googleapis.com. As of May 2023, there are no widely used type server\nimplementations and no plans to implement one.\n\nSchemes other than `http`, `https` (or the empty scheme) might be\nused with implementation specific semantics."
        additionalProperties: {}
      modeInfo:
        $ref: '#/definitions/cosmos.tx.v1beta1.ModeInfo'
        title: 'mode_info describes the signing mode of the signer and is a nested

          structure to support nested multisig pubkey''s'
      sequence:
        type: string
        format: uint64
        description: 'sequence is the sequence of the account, which describes the

          number of committed transactions signed by a given address. It is used to

          prevent replay attacks.'
    description: 'SignerInfo describes the public key and signing mode of a single top-level

      signer.'
  cosmos.tx.v1beta1.ModeInfo.Multi:
    type: object
    properties:
      bitarray:
        title: bitarray specifies which keys within the multisig are signing
        type: object
        properties:
          extraBitsStored:
            type: integer
            format: int64
          elems:
            type: string
            format: byte
        description: 'CompactBitArray is an implementation of a space efficient bit array.

          This is used to ensure that the encoded data takes up a minimal amount of

          space after proto encoding.

          This is not thread safe, and is not intended for concurrent usage.'
      modeInfos:
        type: array
        items:
          type: object
          $ref: '#/definitions/cosmos.tx.v1beta1.ModeInfo'
        title: 'mode_infos is the corresponding modes of the signers of the multisig

          which could include nested multisig public keys'
    title: Multi is the mode info for a multisig public key
  cosmos.tx.v1beta1.ModeInfo:
    type: object
    properties:
      single:
        title: single represents a single signer
        type: object
        properties:
          mode:
            title: mode is the signing mode of the single signer
            type: string
            enum:
            - SIGN_MODE_UNSPECIFIED
            - SIGN_MODE_DIRECT
            - SIGN_MODE_TEXTUAL
            - SIGN_MODE_DIRECT_AUX
            - SIGN_MODE_LEGACY_AMINO_JSON
            - SIGN_MODE_EIP_191
            default: SIGN_MODE_UNSPECIFIED
            description: "SignMode represents a signing mode with its own security guarantees.\n\nThis enum should be considered a registry of all known sign modes\nin the Cosmos ecosystem. Apps are not expected to support all known\nsign modes. Apps that would like to support custom  sign modes are\nencouraged to open a small PR against this file to add a new case\nto this SignMode enum describing their sign mode so that different\napps have a consistent version of this enum.\n\n - SIGN_MODE_UNSPECIFIED: SIGN_MODE_UNSPECIFIED specifies an unknown signing mode and will be\nrejected.\n - SIGN_MODE_DIRECT: SIGN_MODE_DIRECT specifies a signing mode which uses SignDoc and is\nverified with raw bytes from Tx.\n - SIGN_MODE_TEXTUAL: SIGN_MODE_TEXTUAL is a future signing mode that will verify some\nhuman-readable textual representation on top of the binary representation\nfrom SIGN_MODE_DIRECT.\n\nSince: cosmos-sdk 0.50\n - SIGN_MODE_DIRECT_AUX: SIGN_MODE_DIRECT_AUX specifies a signing mode which uses\nSignDocDirectAux. As opposed to SIGN_MODE_DIRECT, this sign mode does not\nrequire signers signing over other signers' `signer_info`.\n\nSince: cosmos-sdk 0.46\n - SIGN_MODE_LEGACY_AMINO_JSON: SIGN_MODE_LEGACY_AMINO_JSON is a backwards compatibility mode which uses\nAmino JSON and will be removed in the future.\n - SIGN_MODE_EIP_191: SIGN_MODE_EIP_191 specifies the sign mode for EIP 191 signing on the Cosmos\nSDK. Ref: https://eips.ethereum.org/EIPS/eip-191\n\nCurrently, SIGN_MODE_EIP_191 is registered as a SignMode enum variant,\nbut is not implemented on the SDK by default. To enable EIP-191, you need\nto pass a custom `TxConfig` that has an implementation of\n`SignModeHandler` for EIP-191. The SDK may decide to fully support\nEIP-191 in the future.\n\nSince: cosmos-sdk 0.45.2"
      multi:
        $ref: '#/definitions/cosmos.tx.v1beta1.ModeInfo.Multi'
        title: multi represents a nested multisig signer
    description: ModeInfo describes the signing mode of a single or nested multisig signer.
  cosmos.tx.v1beta1.GetTxResponse:
    type: object
    properties:
      tx:
        $ref: '#/definitions/cosmos.tx.v1beta1.Tx'
        description: tx is the queried transaction.
      txResponse:
        description: tx_response is the queried TxResponses.
        type: object
        properties:
          height:
            type: string
            format: int64
            title: The block height
          txhash:
            type: string
            description: The transaction hash.
          codespace:
            type: string
            title: Namespace for the Code
          code:
            type: integer
            format: int64
            description: Response code.
          data:
            type: string
            description: Result bytes, if any.
          rawLog:
            type: string
            description: 'The output of the application''s logger (raw string). May be

              non-deterministic.'
          logs:
            type: array
            items:
              type: object
              properties:
                msgIndex:
                  type: integer
                  format: int64
                log:
                  type: string
                events:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      attributes:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            value:
                              type: string
                          description: 'Attribute defines an attribute wrapper where the key and value are

                            strings instead of raw bytes.'
                    description: 'StringEvent defines en Event object wrapper where all the attributes

                      contain key/value pairs that are strings instead of raw bytes.'
                  description: 'Events contains a slice of Event objects that were emitted during some

                    execution.'
              description: ABCIMessageLog defines a structure containing an indexed tx ABCI message log.
            description: The output of the application's logger (typed). May be non-deterministic.
          info:
            type: string
            description: Additional information. May be non-deterministic.
          gasWanted:
            type: string
            format: int64
            description: Amount of gas requested for transaction.
          gasUsed:
            type: string
            format: int64
            description: Amount of gas consumed by transaction.
          tx:
            description: The request transaction bytes.
            type: object
            properties:
              '@type':
                type: string
                description: "A URL/resource name that uniquely identifies the type of the serialized\nprotocol buffer message. This string must contain at least\none \"/\" character. The last segment of the URL's path must represent\nthe fully qualified name of the type (as in\n`path/google.protobuf.Duration`). The name should be in a canonical form\n(e.g., leading \".\" is not accepted).\n\nIn practice, teams usually precompile into the binary all types that they\nexpect it to use in the context of Any. However, for URLs which use the\nscheme `http`, `https`, or no scheme, one can optionally set up a type\nserver that maps type URLs to message definitions as follows:\n\n* If no scheme is provided, `https` is assumed.\n* An HTTP GET on the URL must yield a [google.protobuf.Type][]\n  value in binary format, or produce an error.\n* Applications are allowed to cache lookup results based on the\n  URL, or have them precompiled into a binary to avoid any\n  lookup. Therefore, binary compatibility needs to be preserved\n  on changes to types. (Use versioned type names to manage\n  breaking changes.)\n\nNote: this functionality is not currently available in the official\nprotobuf release, and it is not used for type URLs beginning with\ntype.googleapis.com. As of May 2023, there are no widely used type server\nimplementations and no plans to implement one.\n\nSchemes other than `http`, `https` (or the empty scheme) might be\nused with implementation specific semantics."
            additionalProperties: {}
          timestamp:
            type: string
            description: 'Time of the previous block. For heights > 1, it''s the weighted median of

              the timestamps of the valid votes in the block.LastCommit. For height == 1,

              it''s genesis time.'
          events:
            type: array
            items:
              type: object
              properties:
                type:
                  type: string
                attributes:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
                      index:
                        type: boolean
                        title: nondeterministic
                    description: EventAttribute is a single key-value pair, associated with an event.
              description: 'Event allows application developers to attach additional information to

                ResponseFinalizeBlock and ResponseCheckTx.

                Later, transactions may be queried using these events.'
            description: 'Events defines all the events emitted by processing a transaction. Note,

              these events include those emitted by processing all the messages and those

              emitted from the ante. Whereas Logs contains the events, with

              additional metadata, emitted only by processing the messages.'
    description: GetTxResponse is the response type for the Service.GetTx method.
  cosmos.tx.v1beta1.AuthInfo:
    type: object
    properties:
      signerInfos:
        type: array
        items:
          type: object
          $ref: '#/definitions/cosmos.tx.v1beta1.SignerInfo'
        description: 'signer_infos defines the signing modes for the required signers. The number

          and order of elements must match the required signers from TxBody''s

          messages. The first element is the primary signer and the one which pays

          the fee.'
      fee:
        description: 'Fee is the fee and gas limit for the transaction. The first signer is the

          primary signer and the one which pays the fee. The fee can be calculated

          based on the cost of evaluating the body and doing signature verification

          of the signers. This can be estimated via simulation.'
        type: object
        properties:
          amount:
            type: array
            items:
              type: object
              properties:
                denom:
                  type: string
                amount:
                  type: string
              description: 'Coin defines a token with a denomination and an amount.


                NOTE: The amount field is an Int which implements the custom method

                signatures required by gogoproto.'
            title: amount is the amount of coins to be paid as a fee
          gasLimit:
            type: string
            format: uint64
            title: 'gas_limit is the maximum gas that can be used in transaction processing

              before an out of gas error occurs'
          payer:
            type: string
            description: 'if unset, the first signer is responsible for paying the fees. If set, the

              specified account must pay the fees. the payer must be a tx signer (and

              thus have signed this field in AuthInfo). setting this field does *not*

              change the ordering of required signers for the transaction.'
          granter:
            type: string
            title: 'if set, the fee payer (either the first signer or the value of the payer

              field) requests that a fee grant be used to pay fees instead of the fee

              payer''s own balance. If an appropriate fee grant does not exist or the

              chain does not support fee grants, this will fail'
      tip:
        description: 'Tip is the optional tip used for transactions fees paid in another denom.


          This field is ignored if the chain didn''t enable tips, i.e. didn''t add the

          `TipDecorator` in its posthandler.'
        type: object
        properties:
          amount:
            type: array
            items:
              type: object
              properties:
                denom:
                  type: string
                amount:
                  type: string
              description: 'Coin defines a token with a denomination and an amount.


                NOTE: The amount field is an Int which implements the custom method

                signatures required by gogoproto.'
            title: amount is the amount of the tip
          tipper:
            type: string
            title: tipper is the address of the account paying for the tip
    description: 'AuthInfo describes the fee and signer modes that are used to sign a

      transaction.'
