name: Cosmos
description: >-
  Cosmos is an interoperable blockchain ecosystem providing a modular framework
  (Cosmos SDK) for building sovereign, high-performance application-specific
  blockchains. The Cosmos SDK exposes LCD (Light Client Daemon) REST APIs on
  port 1317, generated automatically via gRPC-gateway from Protobuf definitions.
  These endpoints cover accounts, balances, transactions, governance proposals,
  staking delegations, IBC transfers, minting, distribution, and ABCI app data.
  The Cosmos Hub (cosmoshub-4) is the flagship chain; the same API surface is
  shared by 150+ chains in the ecosystem.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/cosmos/refs/heads/main/apis.yml
