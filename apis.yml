    humanURL: https://docs.cosmos.network/sdk/latest/modules/auth
    baseURL: https://lcd.cosmos.network
    tags:
      - Auth
      - Accounts
      - Authentication
    properties:
      - type: Documentation
        url: https://docs.cosmos.network/sdk/latest/modules/auth
      - type: OpenAPI
        url: https://cosmos.github.io/cosmos-sdk/openapi.html
    contact:
      - FN: Cosmos Developer Support
        url: https://discord.gg/interchain
        email: ""

  - name: Cosmos Bank API
